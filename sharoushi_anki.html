<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>社労士試験 完全数字暗記カード</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --surface2: #f0ede8;
    --text: #1a1816;
    --text2: #6b6560;
    --text3: #a09a94;
    --border: rgba(0,0,0,0.1);
    --border2: rgba(0,0,0,0.18);
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
  }

  /* ヘッダー */
  .site-header {
    background: #1a1816;
    color: #f5f4f0;
    padding: 1.2rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 2px solid #c8a96e;
  }
  .site-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 17px;
    font-weight: 600;
    letter-spacing: 0.04em;
  }
  .site-subtitle { font-size: 11px; color: #a09a94; margin-top: 2px; }
  .header-stats { display: flex; gap: 1rem; }
  .hstat { text-align: right; }
  .hstat-num { font-size: 20px; font-weight: 700; color: #c8a96e; line-height: 1; }
  .hstat-label { font-size: 10px; color: #a09a94; margin-top: 2px; }

  /* レイアウト */
  .layout { display: flex; min-height: calc(100vh - 64px); }

  /* サイドバー */
  .sidebar {
    width: 200px;
    flex-shrink: 0;
    background: #1a1816;
    padding: 1rem 0;
    position: sticky;
    top: 64px;
    height: calc(100vh - 64px);
    overflow-y: auto;
  }
  .sidebar-label {
    font-size: 10px;
    color: #6b6560;
    letter-spacing: 0.08em;
    padding: 0 1rem;
    margin-bottom: 6px;
    margin-top: 12px;
  }
  .sidebar-label:first-child { margin-top: 0; }
  .sidebar-btn {
    display: block;
    width: 100%;
    text-align: left;
    background: none;
    border: none;
    padding: 9px 1rem;
    font-size: 13px;
    font-family: 'Noto Sans JP', sans-serif;
    color: #a09a94;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: all 0.15s;
    line-height: 1.4;
  }
  .sidebar-btn:hover { color: #f5f4f0; background: rgba(255,255,255,0.05); }
  .sidebar-btn.active { color: #f5f4f0; border-left-color: #c8a96e; background: rgba(200,169,110,0.1); }
  .sidebar-count {
    display: inline-block;
    font-size: 10px;
    background: rgba(255,255,255,0.1);
    color: #a09a94;
    border-radius: 100px;
    padding: 1px 6px;
    margin-left: 4px;
    vertical-align: middle;
  }

  /* メインコンテンツ */
  .main { flex: 1; padding: 1.5rem; min-width: 0; }

  /* セクションタブ */
  .section-nav {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 1.2rem;
  }
  .section-btn {
    padding: 5px 12px;
    font-size: 12px;
    font-family: 'Noto Sans JP', sans-serif;
    border: 1px solid var(--border2);
    border-radius: 100px;
    background: var(--surface);
    color: var(--text2);
    cursor: pointer;
    transition: all 0.15s;
  }
  .section-btn:hover { background: var(--surface2); color: var(--text); }
  .section-btn.active { background: #1a1816; color: #f5f4f0; border-color: #1a1816; }

  /* カードグリッド */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 10px;
  }

  /* カード */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
    min-height: 95px;
    position: relative;
    user-select: none;
  }
  .card:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    border-color: var(--border2);
  }
  .card.flipped { background: #1a1816; border-color: #c8a96e; }
  .card.flipped .front { display: none; }
  .card.flipped .back { display: block; }
  .card .back { display: none; }
  .card-tag {
    font-size: 10px;
    color: var(--text3);
    margin-bottom: 5px;
    letter-spacing: 0.04em;
  }
  .card-q { font-size: 13px; color: var(--text); line-height: 1.55; }
  .card-badge {
    display: inline-block;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 100px;
    margin-bottom: 6px;
    background: rgba(200,169,110,0.2);
    color: #c8a96e;
  }
  .card-a {
    font-size: 18px;
    font-weight: 700;
    color: #c8a96e;
    margin-bottom: 5px;
    line-height: 1.3;
  }
  .card-note { font-size: 11px; color: #a09a94; line-height: 1.5; }

  /* 進捗バー */
  .progress-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .progress-label { font-size: 12px; color: var(--text2); }
  .progress-track {
    flex: 1;
    height: 6px;
    background: var(--surface2);
    border-radius: 100px;
    min-width: 100px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: #c8a96e;
    border-radius: 100px;
    transition: width 0.3s;
  }
  .progress-nums { font-size: 12px; font-weight: 500; color: var(--text); white-space: nowrap; }
  .reset-btn {
    padding: 4px 10px;
    font-size: 11px;
    font-family: 'Noto Sans JP', sans-serif;
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    background: none;
    color: var(--text2);
    cursor: pointer;
  }
  .reset-btn:hover { background: var(--surface2); }

  /* ヒント */
  .hint { font-size: 12px; color: var(--text3); text-align: center; margin-bottom: 1rem; }

  /* モバイル */
  @media (max-width: 640px) {
    .sidebar { display: none; }
    .main { padding: 1rem; }
    .cards-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
    .card { min-height: 80px; padding: 10px 12px; }
    .card-a { font-size: 16px; }
    .mobile-subject-nav {
      display: flex;
      overflow-x: auto;
      gap: 6px;
      margin-bottom: 1rem;
      padding-bottom: 4px;
    }
    .mobile-subject-btn {
      flex-shrink: 0;
      padding: 6px 12px;
      font-size: 12px;
      font-family: 'Noto Sans JP', sans-serif;
      border: 1px solid var(--border2);
      border-radius: 100px;
      background: var(--surface);
      color: var(--text2);
      cursor: pointer;
      white-space: nowrap;
    }
    .mobile-subject-btn.active { background: #1a1816; color: #f5f4f0; border-color: #1a1816; }
    .hstat { display: none; }
  }
  @media (min-width: 641px) {
    .mobile-subject-nav { display: none; }
  }
</style>
</head>
<body>

<header class="site-header">
  <div>

    <p class="hint">📖 カードをタップ → 答えが表示されます</p>
    <div class="cards-grid" id="cards-grid"></div>

        { q: "社労士の業務（1号業務）", a: "申請書等の作成・提出代行", note: "独占業務" },
        { q: "社労士の業務（2号業務）", a: "帳簿書類の作成", note: "独占業務" },
        { q: "社労士の業務（3号業務）", a: "相談・指導（コンサルティング）", note: "非独占業務" },
        { q: "試験の合格基準（選択式）", a: "総点数の7割以上かつ各科目3点以上", note: "補正あり" },
        { q: "試験の合格基準（択一式）", a: "総点数の7割以上かつ各科目4点以上", note: "補正あり" },
      ],
    }
  },
];

// 状態管理
let currentSubjectIdx = 0;
let currentSection = "ALL";
let seenCards = new Set();
let totalCards = 0;

// 総カード数計算
subjects.forEach(sub => {
  Object.values(sub.sections).forEach(arr => totalCards += arr.length);
});

function getCardId(subIdx, section, cardIdx) {
  return `${subIdx}_${section}_${cardIdx}`;
}

// サイドバー・モバイルナビ生成
const sidebar = document.getElementById('sidebar');
const mobileNav = document.getElementById('mobile-subject-nav');

subjects.forEach((sub, i) => {
  const count = Object.values(sub.sections).reduce((s, a) => s + a.length, 0);

  const btn = document.createElement('button');
  btn.className = 'sidebar-btn' + (i === 0 ? ' active' : '');
  btn.innerHTML = sub.name + `<span class="sidebar-count">${count}</span>`;
  btn.onclick = () => selectSubject(i);
  sidebar.appendChild(btn);

  const mBtn = document.createElement('button');
  mBtn.className = 'mobile-subject-btn' + (i === 0 ? ' active' : '');
  mBtn.textContent = sub.name;
  mBtn.onclick = () => selectSubject(i);
  mobileNav.appendChild(mBtn);
});

function selectSubject(i) {
  currentSubjectIdx = i;
  currentSection = "ALL";
  document.querySelectorAll('.sidebar-btn').forEach((b, j) => b.classList.toggle('active', j === i));
  document.querySelectorAll('.mobile-subject-btn').forEach((b, j) => b.classList.toggle('active', j === i));
  renderSectionNav();
  renderCards();
}

function renderSectionNav() {
  const sectionNav = document.getElementById('section-nav');
  sectionNav.innerHTML = '';
  const sub = subjects[currentSubjectIdx];

  const allBtn = document.createElement('button');
  allBtn.className = 'section-btn' + (currentSection === 'ALL' ? ' active' : '');
  allBtn.textContent = 'すべて';
  allBtn.onclick = () => { currentSection = 'ALL'; updateSectionBtns(); renderCards(); };
  sectionNav.appendChild(allBtn);

  Object.keys(sub.sections).forEach(name => {
    const btn = document.createElement('button');
    btn.className = 'section-btn' + (currentSection === name ? ' active' : '');
    btn.textContent = name;
    btn.onclick = () => { currentSection = name; updateSectionBtns(); renderCards(); };
    sectionNav.appendChild(btn);
  });
}

function updateSectionBtns() {
  const btns = document.querySelectorAll('.section-btn');
  const keys = ['ALL', ...Object.keys(subjects[currentSubjectIdx].sections)];
  btns.forEach((b, i) => b.classList.toggle('active', keys[i] === currentSection));
}

function renderCards() {
  const sub = subjects[currentSubjectIdx];
  let cards = [];
  let cardIds = [];

  if (currentSection === 'ALL') {
    Object.entries(sub.sections).forEach(([sname, arr]) => {
      arr.forEach((c, ci) => {
        cards.push(c);
        cardIds.push(getCardId(currentSubjectIdx, sname, ci));
      });
    });
  } else {
    (sub.sections[currentSection] || []).forEach((c, ci) => {
      cards.push(c);
      cardIds.push(getCardId(currentSubjectIdx, currentSection, ci));
    });
  }

  const grid = document.getElementById('cards-grid');
  grid.innerHTML = '';

  cards.forEach((c, idx) => {
    const id = cardIds[idx];
    const div = document.createElement('div');
    div.className = 'card' + (seenCards.has(id) ? ' flipped' : '');
    div.innerHTML = `
      <div class="front">
        <div class="card-tag">問題</div>
        <div class="card-q">${c.q}</div>
      </div>
      <div class="back">
        <div class="card-badge">答え</div>
        <div class="card-a">${c.a}</div>
        ${c.note ? `<div class="card-note">${c.note}</div>` : ''}
      </div>`;
    div.onclick = () => {
      div.classList.toggle('flipped');
      if (div.classList.contains('flipped')) {
        seenCards.add(id);
      } else {
        seenCards.delete(id);
      }
      updateProgress(cards, cardIds);
      updateHeaderStats();
    };
    grid.appendChild(div);
  });

  updateProgress(cards, cardIds);
}

function updateProgress(cards, cardIds) {
  const seen = cardIds.filter(id => seenCards.has(id)).length;
  const total = cards.length;
  const pct = total > 0 ? Math.round(seen / total * 100) : 0;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-nums').textContent = seen + ' / ' + total;
}

function updateHeaderStats() {
  document.getElementById('total-count').textContent = totalCards;
  document.getElementById('seen-count').textContent = seenCards.size;
}

function resetFlips() {
  const sub = subjects[currentSubjectIdx];
  let cardIds = [];
  if (currentSection === 'ALL') {
    Object.entries(sub.sections).forEach(([sname, arr]) => {
      arr.forEach((_, ci) => cardIds.push(getCardId(currentSubjectIdx, sname, ci)));
    });
  } else {
    (sub.sections[currentSection] || []).forEach((_, ci) => {
      cardIds.push(getCardId(currentSubjectIdx, currentSection, ci));
    });
  }
  cardIds.forEach(id => seenCards.delete(id));
  renderCards();
  updateHeaderStats();
}

// 初期化
updateHeaderStats();
renderSectionNav();
renderCards();
</script>
</body>
</html>
